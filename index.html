<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-hero: #010102;
      --bg-panel: #0f1011;
      --bg-card: rgba(255,255,255,0.02);
      --text-main: #f7f8f8;
      --text-sec: #d0d6e0;
      --accent: #5e6ad2;
      --border: rgba(255,255,255,0.08);
    }
    body {
      background: var(--bg-hero);
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 100px 20px;
    }
    h1 {
      font-size: 72px;
      font-weight: 510;
      letter-spacing: -1.584px;
      margin: 0;
    }
    p {
      color: var(--text-sec);
      font-size: 18px;
      line-height: 1.6;
      max-width: 600px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 8px;
      margin-top: 40px;
    }
    .cta {
      background: var(--accent);
      color: #fff;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
      font-weight: 510;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Software Engineer.</h1>
    <p>Building scalable systems and machine learning pipelines. Passionate about beautiful code, developer tooling, and open source.</p>
    <a href="#" class="cta">Check my work</a>
    
    <div class="card">
      <h2 style="font-size: 24px; margin-top:0;">Systems Architect</h2>
      <p style="margin-bottom:0;">Experience in distributed systems, backend infrastructure, and high-performance APIs.</p>
    </div>
  </div>
</body>
</html>
